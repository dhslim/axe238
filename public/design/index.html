<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philadelphia — Which look feels right?</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=EB+Garamond&family=Marcellus&display=swap" rel="stylesheet">
<style>
  :root{--bg:#FAF4E6;--ink:#2A2014;--soft:#6B5A40;--gold:#C8972E;--gold-deep:#9A6E20;--line:#E2D4B2;--panel:#FBF6E9}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'EB Garamond',Georgia,serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1120px;margin:0 auto;padding:2.4rem 1.2rem 4rem}
  header{text-align:center;margin-bottom:2rem}
  .eyebrow{font-family:'Marcellus',serif;text-transform:uppercase;letter-spacing:.32em;font-size:.7rem;color:var(--gold-deep)}
  h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(2rem,5.5vw,3.1rem);margin:.4rem 0 .5rem;line-height:1.05}
  .lead{color:var(--soft);font-size:1.05rem;margin:0 auto;max-width:34ch}
  /* tiles */
  a.tile{display:block;text-decoration:none;color:inherit;border-radius:8px;overflow:hidden;border:1px solid var(--line);background:var(--panel);box-shadow:0 2px 6px rgba(120,90,30,.06);transition:transform .22s ease,box-shadow .22s ease}
  a.tile:hover,a.tile:focus-visible{transform:translateY(-5px);box-shadow:0 22px 40px -24px rgba(120,90,30,.5);outline:none}
  a.tile:focus-visible{box-shadow:0 0 0 3px var(--gold)}
  .shot{position:relative;display:block;aspect-ratio:3/2;overflow:hidden;background:#efe6cf}
  .shot img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
  .shot::after{content:'View →';position:absolute;right:.7rem;bottom:.7rem;font-family:'Marcellus',serif;font-size:.72rem;letter-spacing:.1em;color:#fff;background:rgba(42,32,20,.72);padding:.3rem .6rem;border-radius:4px;opacity:0;transition:opacity .22s}
  a.tile:hover .shot::after,a.tile:focus-visible .shot::after{opacity:1}
  .name{display:flex;align-items:center;justify-content:center;gap:.5rem;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.3rem;padding:.7rem .5rem .85rem;text-align:center}
  .badge{font-family:'Marcellus',serif;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;background:var(--gold);color:#fff;padding:.18rem .5rem;border-radius:999px;vertical-align:middle}
  /* featured */
  .featured{margin-bottom:1.6rem}
  .featured .shot{aspect-ratio:16/7}
  .featured .name{font-size:1.6rem}
  /* grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1.3rem}
  .foot{text-align:center;margin-top:2.6rem;color:var(--soft)}
  .foot a{color:var(--gold-deep);font-weight:600}
  .divider{display:flex;align-items:center;gap:1rem;color:var(--gold);margin:2.2rem 0 1.4rem;font-family:'Marcellus',serif;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">The Church of Philadelphia</p>
    <h1>Website design concepts</h1>
    <p class="lead">Tap any design to open it.</p>
  </header>

  <div class="grid">
    <a class="tile" href="./v3-illuminated-light-refined.html" target="_blank" rel="noopener"><span class="shot"><img src="./thumbs/v3-illuminated-light-refined.jpg" alt="Illuminated design" loading="eager"></span><span class="name">Illuminated</span></a>
    <a class="tile" href="./v1-lamplight-refined.html" target="_blank" rel="noopener"><span class="shot"><img src="./thumbs/v1-lamplight-refined.jpg" alt="Lamplight design" loading="lazy"></span><span class="name">Lamplight</span></a>
    <a class="tile" href="./v2-sanctuary-refined.html" target="_blank" rel="noopener"><span class="shot"><img src="./thumbs/v2-sanctuary-refined.jpg" alt="Sanctuary design" loading="lazy"></span><span class="name">Sanctuary</span></a>
    <a class="tile" href="./v3-illuminated-refined.html" target="_blank" rel="noopener"><span class="shot"><img src="./thumbs/v3-illuminated-refined.jpg" alt="Illuminated Dark design" loading="lazy"></span><span class="name">Midnight</span></a>
    <a class="tile" href="./v4-protro-refined.html" target="_blank" rel="noopener"><span class="shot"><img src="./thumbs/v4-protro-refined.jpg" alt="Heritage design" loading="lazy"></span><span class="name">Heritage</span></a>
    <a class="tile" href="./v6-brutalist-refined.html" target="_blank" rel="noopener"><span class="shot"><img src="./thumbs/v6-brutalist-refined.jpg" alt="Bold design" loading="lazy"></span><span class="name">Bold</span></a>
    <a class="tile" href="./v7-commons-refined.html" target="_blank" rel="noopener"><span class="shot"><img src="./thumbs/v7-commons-refined.jpg" alt="Commons design" loading="lazy"></span><span class="name">Commons</span></a>
    <a class="tile" href="./v8-patmos-refined.html" target="_blank" rel="noopener"><span class="shot"><img src="./thumbs/v8-patmos-refined.jpg" alt="Patmos design" loading="lazy"></span><span class="name">Patmos</span></a>
  </div>

</div>
</body>
</html>
